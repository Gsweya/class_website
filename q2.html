<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 2 - Text Formatting Tags</title>
</head>
<body>
  <h1>HTML Text Formatting Tags in Tabular Form</h1>
  <table border="1" cellpadding="8" cellspacing="0">
    <tr>
      <th>Tag</th>
      <th>Output Example</th>
    </tr>
    <tr>
      <td>&lt;b&gt;</td>
      <td><b>Bold text</b></td>
    </tr>
    <tr>
      <td>&lt;strong&gt;</td>
      <td><strong>Strong importance text</strong></td>
    </tr>
    <tr>
      <td>&lt;i&gt;</td>
      <td><i>Italic text</i></td>
    </tr>
    <tr>
      <td>&lt;em&gt;</td>
      <td><em>Emphasized text</em></td>
    </tr>
    <tr>
      <td>&lt;u&gt;</td>
      <td><u>Underlined text</u></td>
    </tr>
    <tr>
      <td>&lt;mark&gt;</td>
      <td><mark>Marked text</mark></td>
    </tr>
    <tr>
      <td>&lt;small&gt;</td>
      <td><small>Small text</small></td>
    </tr>
    <tr>
      <td>&lt;del&gt;</td>
      <td><del>Deleted text</del></td>
    </tr>
    <tr>
      <td>&lt;ins&gt;</td>
      <td><ins>Inserted text</ins></td>
    </tr>
    <tr>
      <td>&lt;sub&gt;</td>
      <td>H<sub>2</sub>O</td>
    </tr>
    <tr>
      <td>&lt;sup&gt;</td>
      <td>x<sup>2</sup></td>
    </tr>
  </table>
</body>
</html>
